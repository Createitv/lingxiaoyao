<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#162544"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A255"/>
      <stop offset="50%" style="stop-color:#E8C973"/>
      <stop offset="100%" style="stop-color:#C8A255"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C973;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C8A255;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#C8A255" flood-opacity="0.15"/>
    </filter>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg3)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#C8A255" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="675"/><line x1="60" y1="0" x2="60" y2="675"/>
    <line x1="120" y1="0" x2="120" y2="675"/><line x1="180" y1="0" x2="180" y2="675"/>
    <line x1="240" y1="0" x2="240" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="360" y1="0" x2="360" y2="675"/><line x1="420" y1="0" x2="420" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/><line x1="540" y1="0" x2="540" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/><line x1="660" y1="0" x2="660" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/><line x1="780" y1="0" x2="780" y2="675"/>
    <line x1="840" y1="0" x2="840" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/><line x1="1020" y1="0" x2="1020" y2="675"/>
    <line x1="1080" y1="0" x2="1080" y2="675"/><line x1="1140" y1="0" x2="1140" y2="675"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="950" cy="200" r="250" fill="#C8A255" opacity="0.03"/>
  <circle cx="1050" cy="120" r="150" fill="#C8A255" opacity="0.02"/>
  <circle cx="100" cy="550" r="200" fill="#1E5AA8" opacity="0.06"/>

  <!-- Enterprise building icon -->
  <g transform="translate(800, 100)" filter="url(#shadow3)">
    <!-- Building base -->
    <rect x="40" y="60" width="240" height="200" rx="8" fill="white" opacity="0.06" stroke="#C8A255" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Building top -->
    <rect x="100" y="20" width="120" height="240" rx="6" fill="white" opacity="0.08" stroke="#C8A255" stroke-width="1" stroke-opacity="0.25"/>
    <!-- Windows -->
    <g fill="#C8A255" opacity="0.2">
      <rect x="120" y="45" width="20" height="16" rx="2"/>
      <rect x="155" y="45" width="20" height="16" rx="2"/>
      <rect x="190" y="45" width="20" height="16" rx="2"/>
      <rect x="120" y="75" width="20" height="16" rx="2"/>
      <rect x="155" y="75" width="20" height="16" rx="2"/>
      <rect x="190" y="75" width="20" height="16" rx="2"/>
      <rect x="120" y="105" width="20" height="16" rx="2"/>
      <rect x="155" y="105" width="20" height="16" rx="2"/>
      <rect x="190" y="105" width="20" height="16" rx="2"/>
      <rect x="65" y="85" width="18" height="14" rx="2"/>
      <rect x="95" y="85" width="18" height="14" rx="2"/>
      <rect x="215" y="85" width="18" height="14" rx="2"/>
      <rect x="245" y="85" width="18" height="14" rx="2"/>
      <rect x="65" y="115" width="18" height="14" rx="2"/>
      <rect x="95" y="115" width="18" height="14" rx="2"/>
      <rect x="215" y="115" width="18" height="14" rx="2"/>
      <rect x="245" y="115" width="18" height="14" rx="2"/>
      <rect x="65" y="145" width="18" height="14" rx="2"/>
      <rect x="95" y="145" width="18" height="14" rx="2"/>
      <rect x="215" y="145" width="18" height="14" rx="2"/>
      <rect x="245" y="145" width="18" height="14" rx="2"/>
    </g>
    <!-- AI signal waves -->
    <g stroke="#C8A255" stroke-width="2" fill="none" opacity="0.3">
      <path d="M160 15 Q160 -5 180 -5" stroke-dasharray="4,3"/>
      <path d="M160 15 Q160 -15 195 -15" stroke-dasharray="4,3"/>
      <path d="M160 15 Q160 -25 210 -25" stroke-dasharray="4,3"/>
    </g>
    <!-- AI badge -->
    <circle cx="160" cy="15" r="12" fill="#C8A255" opacity="0.25"/>
    <text x="160" y="20" text-anchor="middle" fill="#E8C973" font-size="11" font-weight="700" font-family="system-ui, sans-serif">AI</text>
    <!-- Connection nodes -->
    <g fill="#C8A255" opacity="0.15">
      <circle cx="20" cy="160" r="6"/>
      <circle cx="300" cy="130" r="6"/>
      <circle cx="30" cy="100" r="4"/>
      <circle cx="290" cy="200" r="4"/>
    </g>
    <g stroke="#C8A255" stroke-width="1" opacity="0.1" stroke-dasharray="4,4">
      <line x1="20" y1="160" x2="40" y2="160"/>
      <line x1="280" y1="130" x2="300" y2="130"/>
    </g>
  </g>

  <!-- Chart decoration (bottom right) -->
  <g transform="translate(880, 420)" opacity="0.12">
    <rect x="0" y="60" width="24" height="40" rx="4" fill="#C8A255"/>
    <rect x="35" y="40" width="24" height="60" rx="4" fill="#C8A255"/>
    <rect x="70" y="20" width="24" height="80" rx="4" fill="#C8A255"/>
    <rect x="105" y="0" width="24" height="100" rx="4" fill="#E8C973"/>
    <!-- Trend line -->
    <polyline points="12,55 47,35 82,15 117,-5" stroke="#E8C973" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- Gold accent line (top) -->
  <rect x="80" y="160" width="60" height="3" rx="1.5" fill="url(#gold)" opacity="0.7"/>

  <!-- Label -->
  <text x="80" y="200" fill="#C8A255" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" letter-spacing="4" opacity="0.8">ENTERPRISE</text>

  <!-- Main text -->
  <text x="80" y="270" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" letter-spacing="1">AI 企业定制方案</text>

  <!-- Subtitle -->
  <text x="80" y="330" fill="white" opacity="0.75" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="400">量身打造 AI 落地策略，让团队效率翻倍</text>

  <!-- Gold divider -->
  <rect x="80" y="360" width="80" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>

  <!-- Tags -->
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">
    <rect x="80" y="390" width="120" height="36" rx="18" fill="#C8A255" opacity="0.12" stroke="#C8A255" stroke-width="1" stroke-opacity="0.2"/>
    <text x="140" y="414" text-anchor="middle" fill="#E8C973" opacity="0.9">团队培训</text>

    <rect x="220" y="390" width="140" height="36" rx="18" fill="#C8A255" opacity="0.12" stroke="#C8A255" stroke-width="1" stroke-opacity="0.2"/>
    <text x="290" y="414" text-anchor="middle" fill="#E8C973" opacity="0.9">工作流重塑</text>

    <rect x="380" y="390" width="140" height="36" rx="18" fill="#C8A255" opacity="0.12" stroke="#C8A255" stroke-width="1" stroke-opacity="0.2"/>
    <text x="450" y="414" text-anchor="middle" fill="#E8C973" opacity="0.9">AI 工具定制</text>

    <rect x="540" y="390" width="140" height="36" rx="18" fill="#C8A255" opacity="0.12" stroke="#C8A255" stroke-width="1" stroke-opacity="0.2"/>
    <text x="610" y="414" text-anchor="middle" fill="#E8C973" opacity="0.9">持续跟踪</text>
  </g>

  <!-- Price badge -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="180" height="50" rx="25" fill="url(#gold)" opacity="0.15" stroke="#C8A255" stroke-width="1" stroke-opacity="0.3"/>
    <text x="90" y="32" text-anchor="middle" fill="#E8C973" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">&#165;5,999</text>
  </g>

  <!-- Brand -->
  <text x="80" y="610" fill="white" opacity="0.35" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">lingxiaoyao.cn</text>

  <!-- Bottom gold accent -->
  <rect x="0" y="670" width="1200" height="5" fill="url(#gold)" opacity="0.3"/>
</svg>